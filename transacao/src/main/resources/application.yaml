spring:
  application:
    name: transacao
  
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/transacao-db}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notificacao-group
      auto-offset-reset: earliest
      enable-auto-commit: true
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8082

saldo:
  service:
    url: ${SALDO_SERVICE_URL:http://localhost:8081}

camunda:
  bpm:
    client:
      base-url: ${CAMUNDA_BPM_CLIENT_BASE_URL:http://localhost:8080/engine-rest}
      worker-id: transacao-worker
      max-tasks: 10
      lock-duration: 60000
      async-response-timeout: 2000

logging:
  level:
    com.banking.transacao: INFO
    org.springframework.kafka: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      newrelic:
        enabled: false