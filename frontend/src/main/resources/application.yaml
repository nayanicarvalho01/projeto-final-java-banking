server:
  port: 8000

spring:
  application:
    name: frontend-service

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# URLs dos microserviços (com variáveis de ambiente)
services:
  notificacao:
    url: ${NOTIFICACAO_SERVICE_URL:http://localhost:8083}
  saldo:
    url: ${SALDO_SERVICE_URL:http://localhost:8081}
  transacao:
    url: ${TRANSACAO_SERVICE_URL:http://localhost:8082}
  extrato-fatura:
    url: ${EXTRATO_FATURA_SERVICE_URL:http://localhost:8084}

logging:
  level:
    com.banking.frontend: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      newrelic:
        enabled: false